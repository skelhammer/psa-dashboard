psa:
  # List of active providers. All enabled providers sync simultaneously.
  # Options: superops, zendesk, mock
  providers: [mock]  # e.g. [superops, zendesk] for dual-provider
  superops:
    api_url: https://api.superops.ai/msp
    api_token: YOUR_API_TOKEN_HERE
    subdomain: YOUR_SUBDOMAIN
  zendesk:
    subdomain: YOUR_SUBDOMAIN
    email: agent@yourcompany.com
    api_token: YOUR_ZENDESK_API_TOKEN
    page_size: 100
    ticket_url_template: "https://yourcompany.zendesk.com/agent/tickets/{ticket_id}"
    # exclude_custom_fields: ["custom_field_12345:true"]  # Tag matching tickets as Corp
    # status_display_overrides: {"O-CustReplied": "Customer Replied"}
    # extra_agents:                    # Agents not returned by Zendesk search API
    #   "12345678901234": "Agent Name"
    # tech_merge_map:                  # Map Zendesk tech IDs to SuperOps tech IDs
    #   "12345678901234": "superops:9876543210"
  halopsa:  # Pre-stub for future use
    api_url: https://INSTANCE.halopsa.com/api
    client_id: YOUR_CLIENT_ID
    client_secret: YOUR_CLIENT_SECRET

sync:
  interval_minutes: 15
  full_sync_on_first_run: true

database:
  path: ./data/metrics.db

server:
  host: 0.0.0.0
  port: 8880
  timezone: America/Los_Angeles  # IANA timezone for date calculations and display
  closed_statuses: ["Resolved", "Closed"]  # Ticket statuses considered terminal/closed

billing:
  unlimited_plans: []
  # All active clients are treated as hourly (billable) by default.
  # Clients with a contract name or plan field matching these names are excluded.
  # Example: unlimited_plans: ["Managed Plan A", "Managed Plan B"]
  tech_cost_per_hour: 55  # Average fully-loaded cost per tech hour (for profitability)

thresholds:
  stale_ticket_days: 3
  sla_warning_minutes: 30
  max_tickets_per_tech: 20
  utilization_target_min: 60
  utilization_target_max: 85

business_hours:
  enabled: true
  start_hour: 8     # 8:00 AM
  end_hour: 17      # 5:00 PM
  work_days: [1, 2, 3, 4, 5]  # Mon=1 through Fri=5
  holidays: []       # ISO dates like ["2026-01-01", "2026-12-25"]

phone:
  provider: none          # Options: zoom, mock, none
  zoom:
    account_id: YOUR_ZOOM_ACCOUNT_ID      # From Zoom Server-to-Server OAuth app
    client_id: YOUR_ZOOM_CLIENT_ID
    client_secret: YOUR_ZOOM_CLIENT_SECRET

phone_sync:
  interval_minutes: 5
  lookback_days: 30
