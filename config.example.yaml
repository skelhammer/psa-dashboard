psa:
  provider: mock  # Options: superops, mock (change to "superops" for live data)
  superops:
    api_url: https://api.superops.ai/msp
    api_token: YOUR_API_TOKEN_HERE
    subdomain: YOUR_SUBDOMAIN
  halopsa:  # Pre-stub for future use
    api_url: https://INSTANCE.halopsa.com/api
    client_id: YOUR_CLIENT_ID
    client_secret: YOUR_CLIENT_SECRET

sync:
  interval_minutes: 15
  full_sync_on_first_run: true

database:
  path: ./data/metrics.db

server:
  host: 0.0.0.0
  port: 8080
  timezone: America/Los_Angeles  # IANA timezone for date calculations and display

billing:
  # Client plan names (from PSA tags/fields) that indicate hourly billing.
  # Clients with these plans will be auto-flagged for billing audit.
  hourly_plans: []
  # Example: hourly_plans: ["Plan A", "Plan B"]
  unlimited_plans: []
  # Plans that should never be billed (unlimited/managed clients)
  # Example: unlimited_plans: ["Plan C", "Plan D"]

thresholds:
  stale_ticket_days: 3
  sla_warning_minutes: 30
  max_tickets_per_tech: 20
  utilization_target_min: 60
  utilization_target_max: 85

business_hours:
  enabled: true
  start_hour: 8     # 8:00 AM
  end_hour: 17      # 5:00 PM
  work_days: [1, 2, 3, 4, 5]  # Mon=1 through Fri=5
  holidays: []       # ISO dates like ["2026-01-01", "2026-12-25"]
